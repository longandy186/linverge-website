<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Login - Linverge</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--midnight) 0%, var(--primary-dark) 50%, var(--primary) 100%);
            padding: 24px;
        }

        .login-card {
            background: var(--bg-white);
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .login-logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .login-logo .accent {
            color: var(--tech);
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 36px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Open Sans', sans-serif;
            color: var(--text-primary);
            transition: var(--transition);
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--tech);
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Open Sans', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 4px;
        }

        .login-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0, 74, 153, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-error {
            color: #e74c3c;
            font-size: 13px;
            min-height: 20px;
            margin-top: -4px;
        }

        .login-back {
            display: inline-block;
            margin-top: 28px;
            font-size: 14px;
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition);
        }

        .login-back:hover {
            color: var(--primary);
        }

        .login-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            background: var(--tech-soft);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-icon svg {
            width: 28px;
            height: 28px;
            stroke: var(--tech);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
            }
            .login-logo {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">Li<span class="accent">n</span>verge</div>
            <div class="login-icon">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
            </div>
            <p class="login-subtitle">Dashboard Login</p>
            <form class="login-form" id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" autofocus>
                </div>
                <div class="login-error" id="loginError"></div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
            <a href="index.html" class="login-back">&larr; Back to website</a>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const pwd = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');

            if (!pwd) {
                errorEl.textContent = 'Please enter your password.';
                return false;
            }

            // Simple password check — replace with your actual password
            if (pwd === 'linverge2026') {
                errorEl.textContent = '';
                // Redirect to dashboard (placeholder)
                window.location.href = 'dashboard-main.html';
                return false;
            } else {
                errorEl.textContent = 'Incorrect password. Please try again.';
                return false;
            }
        }
    </script>
</body>
</html>
